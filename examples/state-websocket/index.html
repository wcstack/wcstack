<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wcstack: state + websocket demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #edf5f0;
      --panel: rgba(255, 255, 255, 0.92);
      --ink: #1a2e1a;
      --muted: #5a6e5a;
      --line: rgba(60, 120, 60, 0.15);
      --brand: #16a34a;
      --brand-strong: #15803d;
      --accent: #0ea5e9;
      --danger: #dc2626;
      --shadow: 0 20px 50px rgba(26, 46, 26, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Hiragino Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(22, 163, 74, 0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.10), transparent 30%),
        linear-gradient(180deg, #f5faf6 0%, var(--bg) 100%);
    }

    main {
      width: min(800px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 64px;
    }

    .hero {
      display: grid;
      gap: 12px;
      padding: 0 0 24px;
    }

    .eyebrow {
      color: var(--brand);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .lead {
      max-width: 640px;
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.7;
    }

    /* --- status --- */

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      font-size: 0.88rem;
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d97706;
      box-shadow: 0 0 0 5px rgba(217, 119, 6, 0.12);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .dot.live {
      background: var(--brand);
      box-shadow: 0 0 0 5px rgba(22, 163, 74, 0.15);
    }

    .stat-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(22, 163, 74, 0.08);
      color: var(--brand-strong);
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* --- grid --- */

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel h2 {
      margin: 0;
      font-size: 1rem;
    }

    .panel p.lead {
      font-size: 0.88rem;
    }

    /* --- input --- */

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      font-size: 0.92rem;
      background: rgba(255, 255, 255, 0.6);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--brand); }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 10px 16px;
      font: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.18s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-echo { background: var(--brand); color: #fff; }
    .btn-echo:hover:not(:disabled) { background: var(--brand-strong); }
    .btn-broadcast { background: var(--accent); color: #fff; }
    .btn-broadcast:hover:not(:disabled) { background: #0284c7; }

    /* --- log --- */

    .log {
      flex: 1;
      min-height: 240px;
      max-height: 360px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.5);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .log-entry {
      padding: 6px 10px;
      border-radius: 10px;
      word-break: break-word;
    }

    .log-echo {
      background: rgba(22, 163, 74, 0.08);
      color: var(--brand-strong);
    }

    .log-broadcast {
      background: rgba(14, 165, 233, 0.08);
      color: #0369a1;
    }

    .log-stats {
      background: rgba(0, 0, 0, 0.04);
      color: var(--muted);
      font-size: 0.78rem;
    }

    .log-connected {
      background: rgba(22, 163, 74, 0.12);
      color: var(--brand-strong);
      font-weight: 600;
    }

    .log-time {
      font-size: 0.72rem;
      color: var(--muted);
      opacity: 0.7;
    }

    .log-empty {
      flex: 1;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .callout {
      border-radius: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.62);
      color: var(--muted);
      line-height: 1.7;
    }

    .callout strong { color: var(--ink); }

    .error {
      border-color: rgba(220, 38, 38, 0.22);
      background: rgba(254, 242, 242, 0.92);
      color: var(--danger);
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>

  <script type="module" src="/packages/state/dist/auto.js"></script>
  <script type="module" src="/packages/websocket/dist/auto.js"></script>
</head>
<body>
  <wcs-state>
    <script type="module">
      export default {
        wsUrl: "__WS_URL__",
        _lastMessage: null,
        _stats: null,
        get lastMessage() {
          return this._lastMessage;
        },
        set lastMessage(value) {
          this._lastMessage = value;
          if (value && value.type === "stats") {
            this._stats = value;
          }
          this._appendLog(value);
        },
        isConnected: false,
        isLoading: false,
        wsError: null,
        echoInput: "",
        broadcastInput: "",
        nickname: "user-" + Math.random().toString(36).slice(2, 6),
        outgoingMessage: null,
        messageLog: [],

        get connectionLabel() {
          if (this.isLoading) return "Connecting…";
          return this.isConnected ? "Connected" : "Disconnected";
        },

        get hasLog() {
          return this.messageLog.length > 0;
        },

        get canSendEcho() {
          return this.isConnected && this.echoInput.trim() !== "";
        },

        get canSendBroadcast() {
          return this.isConnected && this.broadcastInput.trim() !== "";
        },

        get errorMessage() {
          if (!this.wsError) return "";
          return this.wsError.message || String(this.wsError);
        },

        get clientCount() {
          return this._stats?.clients ?? "—";
        },

        get serverUptime() {
          return this._stats ? this._stats.uptime + "s" : "—";
        },

        _appendLog(msg) {
          if (!msg) return;
          const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
          const entry = { type: msg.type || "unknown", time };

          if (msg.type === "echo") {
            entry.text = msg.content;
          } else if (msg.type === "broadcast") {
            entry.text = `[${msg.from}] ${msg.content}`;
          } else if (msg.type === "connected") {
            entry.text = `WebSocket 接続完了 (${msg.clients} clients)`;
          } else if (msg.type === "stats") {
            // stats はログに追加しない（ステータスバーに表示）
            return;
          } else {
            entry.text = JSON.stringify(msg);
          }

          this.messageLog = [...this.messageLog, entry];
        },

        sendEcho() {
          const text = this.echoInput.trim();
          if (!text || !this.isConnected) return;
          this.outgoingMessage = JSON.stringify({ type: "echo", content: text });
          this.echoInput = "";
        },

        sendBroadcast() {
          const text = this.broadcastInput.trim();
          if (!text || !this.isConnected) return;
          this.outgoingMessage = JSON.stringify({ type: "broadcast", content: text, from: this.nickname });
          this.broadcastInput = "";
        },

        handleEchoKeydown(e) {
          if (e.key === "Enter") {
            e.preventDefault();
            this.sendEcho();
          }
        },

        handleBroadcastKeydown(e) {
          if (e.key === "Enter") {
            e.preventDefault();
            this.sendBroadcast();
          }
        },

        clearLog() {
          this.messageLog = [];
        },
      };
    </script>

  </wcs-state>

  <wcs-ws
    id="ws"
    url="__WS_URL__"
    auto-reconnect
    reconnect-interval="3000"
    max-reconnects="10"
    data-wcs="message: lastMessage; connected: isConnected; loading: isLoading; error: wsError; send: outgoingMessage"
  ></wcs-ws>

  <main>
    <section class="hero">
      <span class="eyebrow">Local Demo</span>
      <h1>state と websocket で作る<br>リアルタイム通信</h1>
      <p class="lead">
        <code>&lt;wcs-ws&gt;</code> の接続状態・受信メッセージを <code>&lt;wcs-state&gt;</code> にバインドし、
        Echo とブロードキャストをリアルタイムに表示しています。
      </p>
    </section>

    <div class="status-bar">
      <div class="status">
        <span class="dot" data-wcs="class.live: isConnected"></span>
        <span data-wcs="textContent: connectionLabel"></span>
      </div>
      <div class="stat-badge">
        Clients: <strong data-wcs="textContent: clientCount"></strong>
      </div>
      <div class="stat-badge">
        Uptime: <strong data-wcs="textContent: serverUptime"></strong>
      </div>
    </div>

    <template data-wcs="if: wsError">
      <div class="callout error" style="margin-bottom: 14px;">
        <strong>Connection Error</strong><br>
        <span data-wcs="textContent: errorMessage"></span>
      </div>
    </template>

    <div class="grid">
      <!-- Echo パネル -->
      <div class="panel">
        <h2>Echo</h2>
        <p class="lead">メッセージを送ると、サーバーがそのまま返します。</p>
        <div class="input-row">
          <input type="text" placeholder="Echo メッセージ…"
            data-wcs="value: echoInput; onkeydown: handleEchoKeydown">
          <button class="btn-echo" data-wcs="onclick: sendEcho; disabled: canSendEcho|not">Send</button>
        </div>
      </div>

      <!-- Broadcast パネル -->
      <div class="panel">
        <h2>Broadcast</h2>
        <p class="lead">全接続クライアントにメッセージを配信します。</p>
        <div class="input-row">
          <input type="text" placeholder="ブロードキャスト…"
            data-wcs="value: broadcastInput; onkeydown: handleBroadcastKeydown">
          <button class="btn-broadcast" data-wcs="onclick: sendBroadcast; disabled: canSendBroadcast|not">Send</button>
        </div>
        <div class="input-row">
          <input type="text" placeholder="ニックネーム" data-wcs="value: nickname" style="max-width: 180px;">
        </div>
      </div>
    </div>

    <!-- メッセージログ -->
    <div class="panel" style="margin-top: 18px;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Message Log</h2>
        <button style="background: rgba(0,0,0,0.06); color: var(--muted); font-size: 0.8rem; padding: 6px 12px;"
          data-wcs="onclick: clearLog">Clear</button>
      </div>

      <div class="log">
        <template data-wcs="if: hasLog|not">
          <div class="log-empty">
            接続後にメッセージがここに表示されます。
          </div>
        </template>

        <template data-wcs="for: messageLog">
          <div>
            <template data-wcs="if: messageLog.*.type|eq(echo)">
              <div class="log-entry log-echo">
                <span class="log-time" data-wcs="textContent: messageLog.*.time"></span>
                Echo: <span data-wcs="textContent: messageLog.*.text"></span>
              </div>
            </template>
            <template data-wcs="if: messageLog.*.type|eq(broadcast)">
              <div class="log-entry log-broadcast">
                <span class="log-time" data-wcs="textContent: messageLog.*.time"></span>
                <span data-wcs="textContent: messageLog.*.text"></span>
              </div>
            </template>
            <template data-wcs="if: messageLog.*.type|eq(connected)">
              <div class="log-entry log-connected">
                <span class="log-time" data-wcs="textContent: messageLog.*.time"></span>
                <span data-wcs="textContent: messageLog.*.text"></span>
              </div>
            </template>
          </div>
        </template>
      </div>
    </div>
  </main>
</body>
</html>
