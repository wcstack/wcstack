<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wcstack: state + fetch demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; color: #1a1a2e; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.1rem; margin-bottom: 0.75rem; color: #16213e; }
    section { margin-bottom: 2rem; padding: 1.5rem; border: 1px solid #e0e0e0; border-radius: 8px; }

    /* User list */
    .user-list { list-style: none; transition: opacity 0.15s; }
    .user-list.stale { opacity: 0.45; }
    /* Rows are <button>s so they are keyboard-focusable and Enter/Space activate
       them; reset the native button look back to a full-width flex row. */
    .user-item { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0.5rem 0.75rem; border: none; border-bottom: 1px solid #f0f0f0; background: none; font: inherit; color: inherit; text-align: left; cursor: pointer; transition: background 0.15s; }
    .user-item:hover { background: #f8f9fa; }
    .user-item:focus-visible { outline: 2px solid #3949ab; outline-offset: -2px; }
    .user-list li:last-child .user-item { border-bottom: none; }
    .user-name { font-weight: 500; }
    .user-email { color: #666; font-size: 0.875rem; }
    .role-badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; background: #e8eaf6; color: #3949ab; }

    /* Filter */
    .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .filter-btn { padding: 0.375rem 0.75rem; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; font-size: 0.875rem; }
    .filter-btn.active { background: #3949ab; color: white; border-color: #3949ab; }

    /* Detail */
    .detail-card { padding: 1rem; background: #f8f9fa; border-radius: 6px; }
    .detail-card dt { font-size: 0.75rem; color: #666; text-transform: uppercase; margin-top: 0.5rem; }
    .detail-card dd { font-size: 1rem; margin-bottom: 0.25rem; }

    /* Form */
    .form-group { margin-bottom: 0.75rem; }
    .form-group label { display: block; font-size: 0.875rem; margin-bottom: 0.25rem; color: #444; }
    .form-group input, .form-group select { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.875rem; }
    .submit-btn { padding: 0.5rem 1.5rem; background: #3949ab; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; }
    .submit-btn:hover { background: #303f9f; }

    /* Spinner */
    .spinner { display: flex; justify-content: center; padding: 1.5rem; }
    .spinner::after { content: ''; width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #3949ab; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status */
    .status-msg { padding: 0.5rem 0.75rem; border-radius: 4px; margin-top: 0.75rem; font-size: 0.875rem; }
    .status-msg.success { background: #e8f5e9; color: #2e7d32; }
    .status-msg.error { background: #fce4ec; color: #c62828; }
  </style>

  <script type="module" src="https://esm.run/@wcstack/state/auto"></script>
  <script type="module" src="https://esm.run/@wcstack/fetch/auto"></script>
</head>
<body>

<h1>wcstack: state + fetch demo</h1>

<!-- ============================================================
     App State
     ============================================================ -->
<wcs-state>
  <script type="module">
    export default {
      // Reload the list by triggering list-fetch's fetch() via a command token (no trigger property)
      $commandTokens: ["refreshList"],
      // Receive create-fetch's response (wcs-fetch:response = the value property event) via an event token.
      // Note: wcs-fetch:response is not success-only — it also fires on HTTP/network errors
      // (value=null, status=error code). Check status in the $on handler to detect success.
      $eventTokens: ["userResponded"],

      // 1 fetch = 1 state slot. The ...: spread wires all wcBindable properties + inputs at once.
      // Uninitialized inputs (undefined) are treated as "no opinion" — the binder skips the write,
      // so the element's defaults (method=GET, manual=false, etc.) stay intact.
      // Inputs (url/method/manual/body) flow state → element: seed the ones you want to change.
      // Outputs (value/loading/error/status) flow the other way — <wcs-fetch> is their authority,
      // so state takes the element's value at bind time and on every event. Seeding them names
      // the slot and documents its shape; it cannot override the element, so seed what the
      // element actually starts with — `value` is null until a response lands, never [].
      listFetch: {
        value: null, loading: false, error: null, status: 0,
      },
      detailFetch: {
        value: null, loading: false, error: null, status: 0,
      },
      createFetch: {
        url: "/api/users", method: "POST", manual: true,
        body: { name: "", email: "", role: "viewer" },
        value: null, error: null, loading: false, status: 0,
      },

      // UI selection state (not fetch properties, so they live outside the slots)
      selectedUserId: null,
      filterRole: "",

      // Computed urls are placed in the slots as nested getters
      get "listFetch.url"() {
        const role = this.filterRole;
        return role ? "/api/users?role=" + role : "/api/users";
      },
      // Empty-url contract: when no user is selected (initial load, or after a
      // filter clears the selection) this returns "". wcs-fetch treats an empty
      // url as "no request" and suppresses the auto-fetch, so the detail pane
      // stays idle. If it did NOT suppress, the relative "" would resolve to the
      // page itself and the fetch would try to parse the HTML document as JSON.
      get "detailFetch.url"() {
        const id = this.selectedUserId;
        return id ? "/api/users/" + id : "";
      },

      selectUser() {
        this["detailFetch.value"] = null;
        // `*` resolves to the index of the clicked row within the `for:` loop, so
        // listRows.*.id reads the id of the user that was actually clicked.
        this.selectedUserId = this["listRows.*.id"];
      },

      filterBy(role) {
        this.filterRole = role;
        this["detailFetch.value"] = null;
        this.selectedUserId = null;
      },

      // onclick binds a method by name and cannot pass arguments, so each filter
      // button gets its own zero-arg wrapper around the shared filterBy(role).
      filterAll() { this.filterBy(""); },
      filterAdmin() { this.filterBy("admin"); },
      filterEditor() { this.filterBy("editor"); },
      filterViewer() { this.filterBy("viewer"); },

      // listFetch.value is null until the first response lands, so the list binds this
      // always-an-array projection instead (a `for:` path has to be an array).
      get listRows() {
        return this["listFetch.value"] ?? [];
      },

      // Spinner only on the FIRST list load (no rows yet). On a filter switch we
      // keep the previous rows and just dim them (stale-while-revalidate, see
      // class.stale below), so the list never flashes empty between filters.
      get listLoadingFirst() {
        return this["listFetch.loading"] && this.listRows.length === 0;
      },

      // Detail pane has three MUTUALLY EXCLUSIVE states. Deriving them as getters
      // (instead of overlapping if/else templates) stops the "Click a user…" hint
      // from showing on top of the spinner while a detail request is in flight.
      get detailLoading() {
        return this["detailFetch.loading"];
      },
      get detailReady() {
        return !this["detailFetch.loading"] && !!this["detailFetch.value"];
      },
      get detailIdle() {
        return !this["detailFetch.loading"] && !this["detailFetch.value"];
      },

      // Hide the success banner while the next submit is in flight, so it can't
      // sit alongside the create spinner (mirrors the detail-pane exclusivity).
      get createSucceeded() {
        return !this["createFetch.loading"] && !!this["createFetch.value"];
      },
      // Mirror image of createSucceeded. FetchCore fills `error` on BOTH HTTP
      // non-2xx (e.g. the 400 from the empty-name guard) AND network throws — only
      // an aborted/superseded request leaves it null — so this one flag covers every
      // real failure. On success `value` is set and `error` was cleared at request
      // start, so createSucceeded / createFailed are never both true.
      get createFailed() {
        return !this["createFetch.loading"] && !!this["createFetch.error"];
      },
      // The server's validation message round-trips today: FetchCore stores the
      // already-read response text on `error.body`, and a nested path off a fetch
      // output binds reactively just like detailFetch.value.name does. The server
      // sends { error: "<reason>" }; surface that reason, falling back to a generic
      // line when the body isn't the expected JSON (e.g. a network error, whose
      // `error` is a raw Error with no body).
      get createErrorMessage() {
        const err = this["createFetch.error"];
        if (!err) return "";
        try {
          const reason = JSON.parse(err.body)?.error;
          if (typeof reason === "string" && reason) return reason;
        } catch { /* body wasn't the server's JSON shape */ }
        return "Could not create user. Check the form and try again.";
      },

      $on: {
        // wcs-fetch:response also fires on errors (HTTP/network), so narrow to success (2xx).
        // status comes from detail.status (FetchCore dispatches detail:{value,status}).
        // This guard is essential: resetting the form on failure would wipe the user's input.
        userResponded: (state, event) => {
          const status = event.detail?.status ?? 0;
          if (status < 200 || status >= 300) return;
          // On success only: reset the form and reload the list
          state["createFetch.body"] = { name: "", email: "", role: "viewer" };
          state.$command.refreshList.emit();
        },
      },
    };
  </script>
</wcs-state>

<!-- ============================================================
     Fetch Components (headless, hidden)
     ============================================================ -->
<wcs-fetch id="list-fetch" data-wcs="...: listFetch; command.fetch: $command.refreshList"></wcs-fetch>
<wcs-fetch id="detail-fetch" data-wcs="...: detailFetch"></wcs-fetch>
<!-- Wiring manual via the slot's manual:true is enough. The spread pushes url before manual,
     but wcs-fetch coalesces auto-fetch into a microtask and decides on the "final state", so the
     manual:true written later in the same tick takes effect and no unintended auto POST runs
     (no hardcoded attribute needed). -->
<wcs-fetch id="create-fetch" data-wcs="...: createFetch; eventToken.value: userResponded">
  <wcs-fetch-header name="Content-Type" value="application/json"></wcs-fetch-header>
</wcs-fetch>

<!-- ============================================================
     Section 1: User List with Filtering
     ============================================================ -->
<section>
  <h2>User List</h2>

  <div class="filter-bar">
    <button class="filter-btn" data-wcs="onclick: filterAll; class.active: filterRole|eq('')">All</button>
    <button class="filter-btn" data-wcs="onclick: filterAdmin; class.active: filterRole|eq('admin')">Admin</button>
    <button class="filter-btn" data-wcs="onclick: filterEditor; class.active: filterRole|eq('editor')">Editor</button>
    <button class="filter-btn" data-wcs="onclick: filterViewer; class.active: filterRole|eq('viewer')">Viewer</button>
  </div>

  <template data-wcs="if: listLoadingFirst">
    <div class="spinner" aria-hidden="true"></div>
  </template>

  <!-- class.stale dims the existing rows while a filter switch reloads, so they
       read as "being updated" rather than current (stale-while-revalidate). -->
  <ul class="user-list" data-wcs="class.stale: listFetch.loading">
    <template data-wcs="for: listRows">
      <li>
        <button type="button" class="user-item" data-wcs="onclick: selectUser">
          <div>
            <span class="user-name" data-wcs="textContent: .name"></span>
            <span class="user-email" data-wcs="textContent: .email"></span>
          </div>
          <span class="role-badge" data-wcs="textContent: .role"></span>
        </button>
      </li>
    </template>
  </ul>
</section>

<!-- ============================================================
     Section 2: User Detail
     ============================================================ -->
<section>
  <h2>User Detail</h2>

  <template data-wcs="if: detailLoading">
    <div class="spinner" aria-hidden="true"></div>
  </template>

  <template data-wcs="if: detailReady">
    <dl class="detail-card">
      <dt>ID</dt>
      <dd data-wcs="textContent: detailFetch.value.id"></dd>
      <dt>Name</dt>
      <dd data-wcs="textContent: detailFetch.value.name"></dd>
      <dt>Email</dt>
      <dd data-wcs="textContent: detailFetch.value.email"></dd>
      <dt>Role</dt>
      <dd data-wcs="textContent: detailFetch.value.role"></dd>
    </dl>
  </template>

  <template data-wcs="if: detailIdle">
    <p style="color: #999;">Click a user above to see details.</p>
  </template>
</section>

<!-- ============================================================
     Section 3: Create User (POST)
     ============================================================ -->
<section>
  <h2>Create User</h2>

  <div class="form-group">
    <label for="create-name">Name</label>
    <input id="create-name" type="text" data-wcs="value: createFetch.body.name" placeholder="Enter name">
  </div>
  <div class="form-group">
    <label for="create-email">Email</label>
    <input id="create-email" type="email" data-wcs="value: createFetch.body.email" placeholder="email@example.com">
  </div>
  <div class="form-group">
    <label for="create-role">Role</label>
    <select id="create-role" data-wcs="value: createFetch.body.role">
      <option value="viewer">Viewer</option>
      <option value="editor">Editor</option>
      <option value="admin">Admin</option>
    </select>
  </div>
  <template data-wcs="if: createFetch.loading">
    <div class="spinner" aria-hidden="true"></div>
  </template>
  <!-- data-fetchtarget="create-fetch" is the autoTrigger shortcut: a click runs
       the fetch() command on the element with that id. It's the click-driven
       counterpart to the command token used for refreshList (which fires fetch()
       from state); use the attribute for a plain button, the token from code. -->
  <button class="submit-btn" data-fetchtarget="create-fetch" data-wcs="disabled: createFetch.loading">Create</button>

  <!-- Permanent live region: role="status" (aria-live=polite) must exist in the DOM
       from page load to announce reliably — a region mounted on-demand together with
       its text is often missed. The success/error templates only swap content INSIDE
       this fixed container (the same shape the search demo's status pill uses).
       createSucceeded / createFailed are mutually exclusive (value vs error, both
       gated on !loading), so the banners never overlap each other or the spinner. -->
  <div role="status" aria-live="polite">
    <template data-wcs="if: createSucceeded">
      <div class="status-msg success">
        Created: <span data-wcs="textContent: createFetch.value.name"></span> (ID: <span data-wcs="textContent: createFetch.value.id"></span>)
      </div>
    </template>
    <template data-wcs="if: createFailed">
      <div class="status-msg error" data-wcs="textContent: createErrorMessage"></div>
    </template>
  </div>
</section>

</body>
</html>
