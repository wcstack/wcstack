<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>@wcstack/state-"keyed" (row-flag selection variant)</title>
    <link href="./css/currentStyle.css" rel="stylesheet"/>
    <script type="importmap">
      {
        "imports": {
          "@lib/buildData": "./buildData.js"
        }
      }
    </script>
    <script type="module" src="../../dist/auto.js"></script>
  </head>
  <body>
    <!--
      選択を「行データのフラグ + 2 本のパス個別書き込み」で表現する変種。
      本家 index.html の selectedIndex + wildcard getter 方式は、selectedIndex の
      動的依存エッジが全行に展開されるため選択が O(全行) になる。この方式は
      葉パス書き込み 2 本（旧行 false / 新行 true）だけが伝播するため O(2)。

      ⚠ js-framework-benchmark へ提出する実装には使わないこと:
      公式ルール（krausest/js-framework-benchmark Issue #800）は「選択状態は
      行ごとのフラグではなくアプリレベルの単一参照で持つ」と定めており、
      行フラグ方式は "view state on the model" として note #800 が付く。
      提出実装は本家 index.html を使う（公式 select は 1,000 行実施で ~0.7ms）。
      このページは実アプリ向けイディオムとエンジン特性の実証用。
      docs/list-replacement-dependency-scaling.md §8.1 参照。
    -->
    <wcs-state>
      <script type="module">
import { buildData } from '@lib/buildData';
const withFlag = (rows) => rows.map(r => ({ ...r, selected: false }));
export default {
  data: [],
  selectedIndex: null,
  onSelect(e, $1) {
    if (this.selectedIndex !== null) {
      this[`data.${this.selectedIndex}.selected`] = false;
    }
    this[`data.${$1}.selected`] = true;
    this.selectedIndex = $1;
  },
  onRemove(e, $1) {
    if (this.selectedIndex === $1) this.selectedIndex = null;
    this.data = this.data.toSpliced($1, 1);
  },
  onRun() {
    this.data = withFlag(buildData(1000));
    this.selectedIndex = null;
  },
  onRunLots() {
    this.data = withFlag(buildData(10000));
    this.selectedIndex = null;
  },
  onAdd() {
    this.data = this.data.concat(withFlag(buildData(1000)));
  },
  onUpdate() {
    for(let i = 0; i < this.data.length; i += 10) {
      this[`data.${i}.label`] += " !!!";
    }
  },
  onClear() {
    this.data = [];
    this.selectedIndex = null;
  },
  onSwapRows() {
    if (this.data.length > 998) {
      const data = this.data.slice();
      [data[1], data[998]] = [data[998], data[1]];
      this.data = data;
    }
  }
}
      </script>
    </wcs-state>

    <div class="container">
      <div class="jumbotron">
        <div class="row">
          <div class="col-md-6">
            <h1>@wcstack/state-"keyed" (row-flag)</h1>
          </div>
          <div class="col-md-6">
            <div class="row">
              <div class="col-sm-6 smallpad">
                <button class="btn btn-primary btn-block" id="run" data-wcs="onclick: onRun">Create 1,000 rows</button>
              </div>
              <div class="col-sm-6 smallpad">
                <button class="btn btn-primary btn-block" id="runlots" data-wcs="onclick: onRunLots">Create 10,000 rows</button>
              </div>
              <div class="col-sm-6 smallpad">
                <button class="btn btn-primary btn-block" id="add" data-wcs="onclick: onAdd">Append 1,000 rows</button>
              </div>
              <div class="col-sm-6 smallpad">
                <button class="btn btn-primary btn-block" id="update" data-wcs="onclick: onUpdate">Update every 10th row</button>
              </div>
              <div class="col-sm-6 smallpad">
                <button class="btn btn-primary btn-block" id="clear" data-wcs="onclick: onClear">Clear</button>
              </div>
              <div class="col-sm-6 smallpad">
                <button class="btn btn-primary btn-block" id="swaprows" data-wcs="onclick: onSwapRows">Swap Rows</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <table class="table table-hover table-striped test-data">
        <tbody>
          <template data-wcs="for: data">
            <tr data-wcs="class.danger: .selected">
              <td class="col-md-1">{{ .id }}</td>
              <td class="col-md-4"><a data-wcs="onclick: onSelect">{{ .label }}</a></td>
              <td class="col-md-1"><a data-wcs="onclick: onRemove"><span class="glyphicon glyphicon-remove" aria-hidden="true"></span></a></td>
              <td class="col-md-6"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
    <span class="preloadicon glyphicon glyphicon-remove" aria-hidden="true"></span>

  </body>
</html>
