<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Declarative Curstom Components</title>
  <script type="module" src="../../dist/auto.js"></script>
  <style>
:not(:defined) {
  display: none;
}
[data-wc-definition] {
  display: none;
}
  </style>
</head>
<body>
  <my-component data-wc-definition>
    <template shadowrootmode="closed">
      <div>{{ count }}</div>
      <button data-wcs="onclick: increment">Increment</button>
      <wcs-state>
        <script type="module">
export default {
  count: 0,
  increment() {
    this.count++;
  },
  $bindables: [ "count" ]
};          
        </script>
      </wcs-state>
    </template>
  </my-component>

  <my-component data-wcs="count: cnt"></my-component>

  <!-- cnt is seeded to 5 (deliberately different from the DCC's own initial
       count: 0) so a producer-snapshot leak back into parent state is visible,
       and the parent button drives the parent→DCC write direction. -->
  <wcs-state>
    <script type="module">
export default {
  cnt: 5,
  get cnt2() {
    return this.cnt * 2;
  },
  incrementParent() {
    this.cnt++;
  }
};
    </script>
  </wcs-state>

  <div data-wcs="textContent: cnt2"></div>
  <button data-wcs="onclick: incrementParent">Increment parent</button>
</body>
</html>
