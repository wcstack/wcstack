name: CI

on:
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          # Discover release-target packages: any packages/* whose package.json
          # is scoped under @wcstack/. This auto-includes new packages and
          # excludes non-published ones (e.g. the vscode-wcs extension).
          all=()
          for dir in packages/*/; do
            [ -f "${dir}package.json" ] || continue
            name=$(node -p "require('./${dir}package.json').name")
            case "$name" in
              @wcstack/*) all+=("$(basename "$dir")") ;;
            esac
          done

          # Determine which files changed relative to the PR base.
          git fetch origin "$BASE_REF" --depth=1 || true
          base=$(git merge-base HEAD "origin/$BASE_REF")
          changed=$(git diff --name-only "$base" HEAD)

          # A change to the shared root tsconfig rebuilds every package.
          if echo "$changed" | grep -qx 'tsconfig.json'; then
            selected=("${all[@]}")
          else
            selected=()
            for pkg in "${all[@]}"; do
              if echo "$changed" | grep -qE "^packages/${pkg}/"; then
                selected+=("$pkg")
              fi
            done
          fi

          if [ ${#selected[@]} -eq 0 ]; then
            echo "packages=[]" >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${selected[@]}" | jq -R . | jq -sc .)
            echo "packages=$json" >> "$GITHUB_OUTPUT"
          fi

  protocol-types-sync:
    # Single-source files that are copied into each package live outside packages/*
    # (protocol/wc-bindable.ts → src/protocol/wcBindable.ts, config-templates/* →
    # rollup.config.js / eslint.config.js), so the change-detection matrix above
    # cannot catch a stale copy — this independent job fails if any generated copy
    # drifts from its source.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/sync-protocol-types.mjs --check
      - run: node scripts/sync-io-core.mjs --check
      - run: node scripts/sync-package-configs.mjs --check

  bindable-conformance:
    # settable wcBindable member ⇒ declared in inputs. A runtime check that
    # imports each package's committed dist bundle and inspects the *evaluated*
    # declaration against the prototype chain's setters — so dynamically
    # generated wcBindable surfaces are covered too, which no source lint can
    # see (the router navigateUrl / DCC $bindables class of drift). Committed
    # dist lags src between releases; release.yml re-runs the same script after
    # the version-bump rebuild so fresh bundles are re-gated before publish.
    # This job installs nothing, so a bundle importing an external bare
    # specifier (server externalizes happy-dom) is skipped here with a note and
    # fully checked in the release.yml re-run, which follows per-package npm ci.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/conformance-bindable-inputs.mjs

  wcs-validate:
    # Phase 5a 静的契約の CI ゲート。vscode-wcs の validator core を wcs-validate CLI
    # 経由で repo の HTML / sidecar manifest に適用し、error severity の診断があれば
    # build を落とす（spread 構文 / path / modifier / 壊れ manifest 等）。外部 state で
    # 静的解決できないパスは warning に留まり build を落とさない（--errors-only で表示も抑制）。
    # vscode-wcs は @wcstack/* でなく detect-changes matrix 対象外なので独立 job にする。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/vscode-wcs/package-lock.json
      - run: npm ci
        working-directory: packages/vscode-wcs
      - run: npm run build
        working-directory: packages/vscode-wcs
      - name: Validate data-wcs bindings (error severity fails the build)
        run: |
          set -euo pipefail
          find examples packages \
            -type d \( -name node_modules -o -name dist -o -name coverage -o -name .tsc-out \) -prune \
            -o -type f \( -name '*.html' -o -name '*.manifest.json' \) -print0 \
            | xargs -0 -r -n 100 node packages/vscode-wcs/dist/cli.cjs --errors-only

  ci:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run typecheck --if-present
      - run: npm run size --if-present
      - run: npm run test:coverage
