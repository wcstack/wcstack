name: CI

on:
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.build-matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            state:
              - 'packages/state/**'
              - 'tsconfig.json'
            autoloader:
              - 'packages/autoloader/**'
              - 'tsconfig.json'
            router:
              - 'packages/router/**'
              - 'tsconfig.json'
            fetch:
              - 'packages/fetch/**'
              - 'tsconfig.json'
            websocket:
              - 'packages/websocket/**'
              - 'tsconfig.json'
            ai:
              - 'packages/ai/**'
              - 'tsconfig.json'
            auth0:
              - 'packages/auth0/**'
              - 'tsconfig.json'
            upload:
              - 'packages/upload/**'
              - 'tsconfig.json'
            server:
              - 'packages/server/**'
              - 'tsconfig.json'
      - id: build-matrix
        env:
          STATE: ${{ steps.filter.outputs.state }}
          AUTOLOADER: ${{ steps.filter.outputs.autoloader }}
          ROUTER: ${{ steps.filter.outputs.router }}
          FETCH: ${{ steps.filter.outputs.fetch }}
          WEBSOCKET: ${{ steps.filter.outputs.websocket }}
          AI: ${{ steps.filter.outputs.ai }}
          AUTH0: ${{ steps.filter.outputs.auth0 }}
          UPLOAD: ${{ steps.filter.outputs.upload }}
          SERVER: ${{ steps.filter.outputs.server }}
        run: |
          packages=()
          for pkg in state autoloader router fetch websocket ai auth0 upload server; do
            key=$(echo "$pkg" | tr '[:lower:]' '[:upper:]')
            if [ "${!key}" == "true" ]; then
              packages+=("$pkg")
            fi
          done
          if [ ${#packages[@]} -eq 0 ]; then
            echo "packages=[]" >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${packages[@]}" | jq -R . | jq -sc .)
            echo "packages=$json" >> "$GITHUB_OUTPUT"
          fi

  ci:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:coverage
