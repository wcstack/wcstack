name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/*/package-lock.json

      # Discover release-target packages: any packages/* whose package.json is
      # scoped under @wcstack/. Auto-includes new packages; excludes the
      # vscode-wcs extension (published separately to the VS Code Marketplace).
      - name: Discover packages
        id: discover
        run: |
          set -euo pipefail
          pkgs=$(
            for dir in packages/*/; do
              [ -f "${dir}package.json" ] || continue
              name=$(node -p "require('./${dir}package.json').name")
              case "$name" in
                @wcstack/*) basename "$dir" ;;
              esac
            done | sort | tr '\n' ' '
          )
          echo "Packages: $pkgs"
          echo "list=$pkgs" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          for pkg in ${{ steps.discover.outputs.list }}; do
            echo "::group::npm ci — $pkg"
            (cd "packages/$pkg" && npm ci)
            echo "::endgroup::"
          done

      - name: Build all packages
        run: |
          for pkg in ${{ steps.discover.outputs.list }}; do
            echo "::group::build — $pkg"
            (cd "packages/$pkg" && npm run build)
            echo "::endgroup::"
          done

      - name: Test all packages
        run: |
          for pkg in ${{ steps.discover.outputs.list }}; do
            echo "::group::test — $pkg"
            (cd "packages/$pkg" && npm run typecheck --if-present && npm run test:coverage)
            echo "::endgroup::"
          done

      # Compute a single unified target version: take the highest current
      # version across all packages and apply the requested bump. Then pin
      # every package to that exact version, pulling any lagging packages
      # (e.g. a freshly added 1.0.0) onto the shared line.
      - name: Bump versions
        id: bump
        run: |
          set -euo pipefail
          versions=$(
            for pkg in ${{ steps.discover.outputs.list }}; do
              node -p "require('./packages/$pkg/package.json').version"
            done
          )
          max=$(printf '%s\n' $versions | sort -V | tail -1)
          IFS=. read -r major minor patch <<< "$max"
          case "${{ inputs.version_type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          target="$major.$minor.$patch"
          echo "Bumping all packages from max $max to $target"
          for pkg in ${{ steps.discover.outputs.list }}; do
            (cd "packages/$pkg" && npm version "$target" --no-git-tag-version --allow-same-version)
          done
          echo "version=$target" >> "$GITHUB_OUTPUT"

      # Verify all packages now share the unified version.
      - name: Verify version consistency
        run: |
          set -euo pipefail
          expected="${{ steps.bump.outputs.version }}"
          for pkg in ${{ steps.discover.outputs.list }}; do
            actual=$(node -p "require('./packages/$pkg/package.json').version")
            if [ "$actual" != "$expected" ]; then
              echo "::error::Version mismatch in $pkg: expected $expected, got $actual"
              exit 1
            fi
          done
          echo "All packages are at v$expected"

      # Rebuild after version bump so dist files embed the new VERSION constant
      # (`export const VERSION = pkg.version` is bundled at build time).
      - name: Rebuild after version bump
        run: |
          for pkg in ${{ steps.discover.outputs.list }}; do
            echo "::group::rebuild — $pkg"
            (cd "packages/$pkg" && npm run build)
            echo "::endgroup::"
          done

      # Commit release artifacts locally so npm publish uses the same tree that will be tagged.
      - name: Commit release artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json packages/*/package-lock.json packages/*/dist
          git commit -m "chore: bump all packages to v${{ steps.bump.outputs.version }}"

      # Publish to npm — idempotent: skip any package whose target version is
      # already on the registry, so a run that failed partway through the loop
      # can be safely re-run without EPUBLISH conflicts on the published half.
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          target="${{ steps.bump.outputs.version }}"
          for pkg in ${{ steps.discover.outputs.list }}; do
            name=$(node -p "require('./packages/$pkg/package.json').name")
            published=$(npm view "$name@$target" version 2>/dev/null || true)
            if [ "$published" = "$target" ]; then
              echo "::group::publish — $name (already at $target, skipping)"
            else
              echo "::group::publish — $name"
              (cd "packages/$pkg" && npm publish --access public --provenance)
            fi
            echo "::endgroup::"
          done

      # Push only after all npm publishes succeed so git history and tags reflect a completed release.
      - name: Tag and push release
        run: |
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.version }}"

      # Create GitHub Release
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes
